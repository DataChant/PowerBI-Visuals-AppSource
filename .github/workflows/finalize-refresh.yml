name: "Phase 3: Finalize Refresh"

# Runs SummarizeDiff and AnalyzeLeaderboard, commits results,
# and creates a GitHub Discussion announcement.
#
# Trigger this manually after Phase 2 completes.

on:
  workflow_dispatch:
    # Manual trigger only

permissions:
  contents: write
  discussions: write

jobs:
  finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git-based analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run analysis pipeline
        run: python "Automation tools/Private/run_pipeline.py"

      - name: Commit analysis results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "visual_summary_diff.md" "leaderboard_data.csv"

          if git diff --cached --quiet; then
            echo "No analysis changes to commit."
          else
            git commit -m "leadership + diff"
            git push
          fi

      - name: Create GitHub Discussion announcement
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python "Automation tools/Private/create_announcement.py"
